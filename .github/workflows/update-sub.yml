name: Update VPN Subscription

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download subscriptions
        run: |
          curl -L "https://142.111.244.83:2096/sub/jb5my60bgr0x64jz" > sub.txt
          echo "" >> sub.txt
          curl -L "https://186.246.47.135:2096/sub/b5tq5izs9xc027kl" >> sub.txt

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add sub.txt

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update subscription"
          git push
